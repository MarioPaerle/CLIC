<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>CLIC</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%23000'/%3E%3Ctext x='4' y='24' font-size='22' font-family='monospace' fill='%237aa2f7'%3E%3E_%3C/text%3E%3C/svg%3E">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    height: 100%;
    background: var(--bg, #000);
    overflow: hidden;
    font-family: var(--ui-font, 'JetBrainsMono Nerd Font'), 'CaskaydiaCove Nerd Font',
                 'FiraCode Nerd Font', 'Cascadia Code', 'Consolas', monospace;
  }

  #app { display: flex; height: 100%; flex-direction: column; }
  #main { display: flex; flex: 1; overflow: hidden; }

  /* Background image overlay */
  #bg-image {
    position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    background-size: cover; background-position: center;
    pointer-events: none; z-index: 0;
    opacity: var(--bg-opacity, 0.05);
    display: none;
  }
  #bg-image.active { display: block; }
  #app { position: relative; z-index: 1; }

  /* ── Tab bar ──────────────────────────────── */
  #tab-bar {
    display: flex; align-items: center;
    background: var(--tab-bg, #000);
    border-bottom: 1px solid var(--tab-border, #111);
    height: 32px; padding: 0 8px; gap: 0;
    user-select: none; -webkit-app-region: drag;
    flex-shrink: 0;
  }
  #tabs-container { display: flex; align-items: center; flex-shrink: 0; }
  .tab {
    padding: 6px 14px; color: var(--tab-text, #333); font-size: 12px;
    cursor: pointer; border-right: 1px solid var(--tab-border, #111);
    white-space: nowrap; display: flex; align-items: center; gap: 8px;
    font-family: inherit; -webkit-app-region: no-drag;
  }
  .tab:hover { color: var(--tab-hover, #888); }
  .tab.active { color: var(--tab-active, #7aa2f7); }
  .tab .close-tab { font-size: 14px; opacity: 0; transition: opacity 0.1s; padding: 0 2px; }
  .tab:hover .close-tab { opacity: 0.5; }
  .tab .close-tab:hover { opacity: 1; }
  #new-tab-btn {
    padding: 6px 10px; color: var(--tab-text, #333); font-size: 14px;
    cursor: pointer; -webkit-app-region: no-drag;
  }
  #new-tab-btn:hover { color: var(--tab-hover, #888); }
  #sidebar-toggle {
    padding: 6px 10px; color: var(--tab-text, #333); font-size: 14px;
    cursor: pointer; -webkit-app-region: no-drag; margin-right: 4px;
    opacity: 0.5;
  }
  #sidebar-toggle:hover { opacity: 1; color: var(--tab-active, #7aa2f7); }

  /* ── Sidebar ──────────────────────────────── */
  #sidebar {
    width: 220px; background: var(--sidebar-bg, #000);
    border-right: 1px solid var(--sidebar-border, #111);
    display: flex; flex-direction: column; overflow: hidden; flex-shrink: 0;
    transition: width 0.15s ease, border 0.15s ease;
  }
  #sidebar.hidden { width: 0; min-width: 0; border: none; overflow: hidden; }
  #sidebar.hidden > * { opacity: 0; pointer-events: none; }

  #logo-area {
    padding: 12px 16px 4px; display: flex; align-items: center; gap: 8px; user-select: none;
  }
  #logo-area img { width: 22px; height: 22px; object-fit: contain; border-radius: 4px; }
  #logo-area .logo-text { color: var(--tab-active, #7aa2f7); font-size: 13px; font-weight: 700; letter-spacing: 1px; }

  #sidebar-header {
    padding: 8px 16px 6px; color: #2a2a2a; font-size: 10px;
    text-transform: uppercase; letter-spacing: 2px; user-select: none;
    display: flex; align-items: center; justify-content: space-between;
  }
  #open-folder-btn {
    font-size: 12px; cursor: pointer; opacity: 0.4; padding: 0 2px;
    color: var(--tab-active, #7aa2f7);
  }
  #open-folder-btn:hover { opacity: 1; }
  #sidebar-path {
    padding: 0 16px 8px; color: #282828; font-size: 11px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis; user-select: none;
  }

  /* ── Context menu ─────────────────────────────── */
  #ctx-menu {
    position: fixed; background: var(--tab-bg, #0a0a0a);
    border: 1px solid var(--sidebar-border, #222); border-radius: 5px;
    padding: 4px 0; z-index: 9999; display: none; min-width: 160px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.6);
  }
  #ctx-menu.visible { display: block; }
  .ctx-item {
    padding: 6px 14px; font-size: 12px; cursor: pointer;
    color: var(--sidebar-text, #888); white-space: nowrap; font-family: inherit;
  }
  .ctx-item:hover { background: var(--sidebar-hover-bg, #111); color: var(--tab-active, #7aa2f7); }
  #file-list { flex: 1; overflow-y: auto; overflow-x: hidden; }
  #file-list::-webkit-scrollbar { width: 3px; }
  #file-list::-webkit-scrollbar-track { background: transparent; }
  #file-list::-webkit-scrollbar-thumb { background: #1a1a1a; border-radius: 2px; }

  .file-entry {
    padding: 2px 16px; color: var(--sidebar-text, #3a3a3a); font-size: 13px;
    cursor: pointer; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    user-select: none; line-height: 1.7; font-family: inherit;
  }
  .file-entry:hover { background: var(--sidebar-hover-bg, #060606); color: #666; }
  .file-entry.dir { color: var(--sidebar-dir, #5a6a90); }
  .file-entry.dir:hover { color: var(--sidebar-dir-hover, #7aa2f7); }
  .file-entry.up { color: #333; }
  .file-entry.up:hover { color: #555; }
  .file-entry.selected { background: var(--sidebar-hover-bg, #060606); color: #888; }
  .file-entry.hidden-entry { color: #222; }
  .file-entry.hidden-entry:hover { color: #555; }
  .file-entry.dir.hidden-entry { color: #2a3550; }
  .file-entry.dir.hidden-entry:hover { color: #5a7abf; }

  /* ── Shortcuts section ────────────────────── */
  #shortcuts-section {
    border-top: 1px solid var(--sidebar-border, #111);
    padding: 6px 0;
  }
  #shortcuts-header {
    padding: 4px 16px; color: #2a2a2a; font-size: 10px;
    text-transform: uppercase; letter-spacing: 2px; user-select: none;
  }
  .shortcut-entry {
    padding: 2px 16px; color: #3a3a3a; font-size: 12px;
    cursor: pointer; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    user-select: none; line-height: 1.7; display: flex; justify-content: space-between;
  }
  .shortcut-entry:hover { background: var(--sidebar-hover-bg, #060606); color: #777; }
  .shortcut-entry .shortcut-key { color: #2a2a2a; font-size: 10px; }

  /* ── Settings panel ───────────────────────── */
  #settings-panel {
    border-top: 1px solid var(--sidebar-border, #111);
    padding: 10px 14px; display: flex; flex-direction: column; gap: 8px;
  }
  .setting-row { display: flex; align-items: center; gap: 8px; }
  .setting-row label {
    color: #3a3a3a; font-size: 10px; text-transform: uppercase;
    letter-spacing: 1px; min-width: 32px;
  }
  .setting-row input[type="color"] {
    -webkit-appearance: none; border: 1px solid #1a1a1a; border-radius: 3px;
    width: 24px; height: 18px; padding: 0; cursor: pointer; background: transparent;
  }
  .setting-row input[type="color"]::-webkit-color-swatch-wrapper { padding: 1px; }
  .setting-row input[type="color"]::-webkit-color-swatch { border: none; border-radius: 2px; }
  .toggle {
    position: relative; width: 32px; height: 16px; background: #1a1a1a;
    border-radius: 8px; cursor: pointer; transition: background 0.2s;
  }
  .toggle.on { background: var(--tab-active, #7aa2f7); }
  .toggle::after {
    content: ''; position: absolute; top: 2px; left: 2px;
    width: 12px; height: 12px; background: #555; border-radius: 50%;
    transition: transform 0.2s, background 0.2s;
  }
  .toggle.on::after { transform: translateX(16px); background: #fff; }

  /* ── Terminal area ────────────────────────── */
  #terminals { flex: 1; position: relative; overflow: hidden; }
  .terminal-instance { position: absolute; top: 0; left: 0; right: 0; bottom: 0; display: none; }
  .terminal-instance.active { display: block; }
  .xterm { height: 100% !important; }
  .xterm-viewport::-webkit-scrollbar { width: 4px; }
  .xterm-viewport::-webkit-scrollbar-track { background: transparent; }
  .xterm-viewport::-webkit-scrollbar-thumb { background: #1a1a1a; border-radius: 2px; }

  /* ── Markdown viewer ──────────────────────── */
  .md-viewer {
    position: absolute; top: 0; left: 0; right: 0; bottom: 0;
    display: none; overflow-y: auto; padding: 24px 32px;
    background: var(--bg, #000); color: var(--sidebar-text, #999);
    font-family: inherit; font-size: 14px; line-height: 1.7;
  }
  .md-viewer.active { display: block; }
  .md-viewer::-webkit-scrollbar { width: 4px; }
  .md-viewer::-webkit-scrollbar-track { background: transparent; }
  .md-viewer::-webkit-scrollbar-thumb { background: #1a1a1a; border-radius: 2px; }
  .md-viewer h1, .md-viewer h2, .md-viewer h3 { color: var(--tab-active, #7aa2f7); margin: 16px 0 8px; }
  .md-viewer h1 { font-size: 22px; border-bottom: 1px solid var(--sidebar-border, #111); padding-bottom: 8px; }
  .md-viewer h2 { font-size: 18px; }
  .md-viewer h3 { font-size: 15px; }
  .md-viewer p { margin: 8px 0; color: var(--sidebar-text, #888); }
  .md-viewer a { color: var(--tab-active, #7aa2f7); text-decoration: none; }
  .md-viewer a:hover { text-decoration: underline; }
  .md-viewer code {
    background: rgba(255,255,255,0.05); padding: 2px 6px; border-radius: 3px;
    font-family: inherit; font-size: 13px;
  }
  .md-viewer pre {
    background: rgba(255,255,255,0.03); padding: 12px 16px; border-radius: 6px;
    overflow-x: auto; margin: 12px 0; border: 1px solid var(--sidebar-border, #111);
  }
  .md-viewer pre code { background: none; padding: 0; }
  .md-viewer blockquote {
    border-left: 3px solid var(--tab-active, #7aa2f7); padding: 4px 16px;
    margin: 12px 0; opacity: 0.7;
  }
  .md-viewer ul, .md-viewer ol { padding-left: 24px; margin: 8px 0; }
  .md-viewer li { margin: 4px 0; }
  .md-viewer img { max-width: 100%; border-radius: 6px; margin: 8px 0; }
  .md-viewer table { border-collapse: collapse; margin: 12px 0; }
  .md-viewer th, .md-viewer td { border: 1px solid var(--sidebar-border, #111); padding: 6px 12px; }
  .md-viewer th { background: rgba(255,255,255,0.03); }
</style>

<body>
<div id="bg-image"></div>
<div id="ctx-menu">
  <div class="ctx-item" id="ctx-activate-venv">⚡ Activate venv</div>
</div>
<div id="app">
  <div id="tab-bar">
    <div id="sidebar-toggle" title="Toggle sidebar (Alt+E)">☰</div>
    <div id="tabs-container"></div>
    <div id="new-tab-btn" title="New tab (Ctrl+T)">+</div>
  </div>
  <div id="main">
    <div id="sidebar">
      <div id="logo-area">
        <img id="logo-img" src="logo.png" onerror="this.style.display='none'" alt="">
        <span class="logo-text">CLIC</span>
      </div>
      <div id="sidebar-header">
        <span>files</span>
        <span id="open-folder-btn" title="Open folder…" style="font-family:sans-serif">📂</span>
      </div>
      <div id="sidebar-path"></div>
      <div id="file-list"></div>
      <div id="shortcuts-section">
        <div id="shortcuts-header">shortcuts</div>
        <div id="shortcuts-list"></div>
      </div>
      <div id="settings-panel">
        <div class="setting-row">
          <label>bg</label>
          <input type="color" id="pick-bg" value="#000000" title="Background color">
          <label>fg</label>
          <input type="color" id="pick-fg" value="#d4d4d4" title="Text color">
        </div>
        <div class="setting-row">
          <label>accent</label>
          <input type="color" id="pick-accent" value="#7aa2f7" title="Accent color">
          <label>light</label>
          <div class="toggle" id="toggle-light" title="Toggle light mode"></div>
        </div>
      </div>
    </div>
    <div id="terminals"></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/xterm@5/lib/xterm.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0/lib/xterm-addon-fit.js"></script>
<script src="https://cdn.jsdelivr.net/npm/marked@12/marked.min.js"></script>
<script>
// ── Config from server ──────────────────────────
let CONFIG = {};
let THEME = {};
let isLight = false;

const DARK_DEFAULTS = {
  background: '#000000', foreground: '#d4d4d4', cursor: '#7aa2f7',
};
const LIGHT_DEFAULTS = {
  background: '#fafafa', foreground: '#383838', cursor: '#2e5cb8',
};

async function loadTheme() {
  try { THEME = await (await fetch('/theme.json?' + Date.now())).json(); } catch(e) {}
  applyCurrent();
}

function applyCurrent() {
  const c = THEME.colors || {};
  const root = document.documentElement.style;
  const pickBg = document.getElementById('pick-bg');
  const pickFg = document.getElementById('pick-fg');
  const pickAccent = document.getElementById('pick-accent');

  const bg = pickBg._userSet ? pickBg.value : (isLight ? LIGHT_DEFAULTS.background : (c.background || DARK_DEFAULTS.background));
  const fg = pickFg._userSet ? pickFg.value : (isLight ? LIGHT_DEFAULTS.foreground : (c.foreground || DARK_DEFAULTS.foreground));
  const accent = pickAccent._userSet ? pickAccent.value : (c.cursor || DARK_DEFAULTS.cursor);

  pickBg.value = bg; pickFg.value = fg; pickAccent.value = accent;

  const bgNum = parseInt(bg.slice(1), 16);
  const isBgLight = ((bgNum>>16)&0xff)*0.299 + ((bgNum>>8)&0xff)*0.587 + (bgNum&0xff)*0.114 > 128;
  const border = isBgLight ? '#e0e0e0' : '#111111';
  const dim = isBgLight ? '#aaaaaa' : '#333333';
  const fileT = isBgLight ? '#888' : '#3a3a3a';
  const hBg = isBgLight ? '#eee' : '#060606';
  const dirC = adjustBrightness(accent, isBgLight ? -30 : -40);

  root.setProperty('--bg', bg);
  root.setProperty('--sidebar-bg', bg); root.setProperty('--sidebar-border', border);
  root.setProperty('--sidebar-text', fileT); root.setProperty('--sidebar-dir', dirC);
  root.setProperty('--sidebar-dir-hover', accent); root.setProperty('--sidebar-hover-bg', hBg);
  root.setProperty('--tab-bg', bg); root.setProperty('--tab-border', border);
  root.setProperty('--tab-text', dim); root.setProperty('--tab-active', accent);
  root.setProperty('--tab-hover', isBgLight ? '#666' : '#888');

  document.querySelector('.logo-text').style.color = accent;
  tabs.forEach(t => { t.term.options.theme = buildXtermTheme(bg, fg, accent); });

  if (ws && ws.readyState === WebSocket.OPEN) {
    ws.send(JSON.stringify({ type: 'save_colors', background: bg, foreground: fg, accent, light: isLight }));
  }
}

function adjustBrightness(hex, amt) {
  let r = Math.max(0, Math.min(255, parseInt(hex.slice(1,3),16)+amt));
  let g = Math.max(0, Math.min(255, parseInt(hex.slice(3,5),16)+amt));
  let b = Math.max(0, Math.min(255, parseInt(hex.slice(5,7),16)+amt));
  return '#'+[r,g,b].map(x=>x.toString(16).padStart(2,'0')).join('');
}

function buildXtermTheme(bg, fg, accent) {
  const c = THEME.colors || {};
  const bgN = parseInt(bg.slice(1),16);
  const light = ((bgN>>16)&0xff)*0.299+((bgN>>8)&0xff)*0.587+(bgN&0xff)*0.114>128;
  return {
    background: bg, foreground: fg, cursor: accent, cursorAccent: bg,
    selectionBackground: light ? '#d0d8e8' : '#1a1a2e', selectionForeground: fg,
    black: c.black||'#1a1a2e', red: c.red||'#f7768e', green: c.green||'#9ece6a',
    yellow: c.yellow||'#e0af68', blue: c.blue||'#7aa2f7', magenta: c.magenta||'#bb9af7',
    cyan: c.cyan||'#7dcfff', white: c.white||'#c0caf5',
    brightBlack: c.brightBlack||'#565f89', brightRed: c.brightRed||'#f7768e',
    brightGreen: c.brightGreen||'#9ece6a', brightYellow: c.brightYellow||'#e0af68',
    brightBlue: c.brightBlue||'#7aa2f7', brightMagenta: c.brightMagenta||'#bb9af7',
    brightCyan: c.brightCyan||'#7dcfff', brightWhite: c.brightWhite||'#ffffff',
  };
}

// ── Settings controls ───────────────────────────
function initSettings() {
  const pickBg = document.getElementById('pick-bg');
  const pickFg = document.getElementById('pick-fg');
  const pickAccent = document.getElementById('pick-accent');
  const toggleLight = document.getElementById('toggle-light');
  [pickBg, pickFg, pickAccent].forEach(el => { el._userSet = false; });
  pickBg.addEventListener('input', () => { pickBg._userSet = true; applyCurrent(); });
  pickFg.addEventListener('input', () => { pickFg._userSet = true; applyCurrent(); });
  pickAccent.addEventListener('input', () => { pickAccent._userSet = true; applyCurrent(); });
  toggleLight.addEventListener('click', () => {
    isLight = !isLight;
    toggleLight.classList.toggle('on', isLight);
    pickBg._userSet = false; pickFg._userSet = false;
    applyCurrent();
  });
}

// ── Tab / Terminal management ───────────────────
let tabs = [];
let activeTabId = null;
let tabCounter = 0;
let ws = null;

function getTermFont() {
  // Use font from config, falling back to theme.json, then defaults
  const cfgFont = (CONFIG.font || {}).family;
  const themeFont = (THEME.font || {}).family;
  return cfgFont || themeFont || "'JetBrainsMono Nerd Font'";
}

function getTermFontSize() {
  return (CONFIG.font || {}).size || (THEME.font || {}).size || 14;
}

function getTermLineHeight() {
  return (CONFIG.font || {}).line_height || (THEME.font || {}).lineHeight || 1.2;
}

function createTab() {
  tabCounter++;
  const id = 'term-' + tabCounter;
  const el = document.createElement('div');
  el.className = 'terminal-instance'; el.id = id;
  document.getElementById('terminals').appendChild(el);

  const fontFamily = getTermFont() + ", 'CaskaydiaCove Nerd Font', 'FiraCode Nerd Font', 'Cascadia Code', 'Consolas', monospace";
  const cur = THEME.cursor || {};
  // Use current picker colors so new tabs match existing ones
  const curBg = document.getElementById('pick-bg').value;
  const curFg = document.getElementById('pick-fg').value;
  const curAccent = document.getElementById('pick-accent').value;
  const term = new Terminal({
    theme: buildXtermTheme(curBg, curFg, curAccent),
    fontFamily: fontFamily,
    fontSize: getTermFontSize(),
    lineHeight: getTermLineHeight(),
    cursorBlink: cur.blink !== false,
    cursorStyle: cur.style || 'bar',
    scrollback: 5000,
    allowTransparency: true,
  });
  const fitAddon = new FitAddon.FitAddon();
  term.loadAddon(fitAddon);
  term.open(el);

  const tabEl = document.createElement('div');
  tabEl.className = 'tab';
  tabEl.innerHTML = `<span class="tab-label"> ${tabCounter}</span><span class="close-tab">×</span>`;
  tabEl.querySelector('.tab-label').addEventListener('click', () => switchTab(id));
  tabEl.querySelector('.close-tab').addEventListener('click', (e) => { e.stopPropagation(); closeTab(id); });
  document.getElementById('tabs-container').appendChild(tabEl);

  term.onData(data => {
    if (ws && ws.readyState === WebSocket.OPEN)
      ws.send(JSON.stringify({ type: 'input', session: id, data }));
  });
  term.onResize(({cols, rows}) => {
    if (ws && ws.readyState === WebSocket.OPEN)
      ws.send(JSON.stringify({ type: 'resize', session: id, cols, rows }));
  });

  const tab = { id, term, fitAddon, el, tabEl };
  tabs.push(tab);
  switchTab(id); // makes el visible so fit() gets real dimensions

  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      fitAddon.fit();
      // Write banner client-side after correct dimensions are established
      const accent = '\x1b[38;2;122;162;247m';
      const dim    = '\x1b[38;2;80;80;80m';
      const bold   = '\x1b[1m';
      const reset  = '\x1b[0m';
      term.write(
        accent +
        '      (\\_/)\r\n' +
        '     =(^.^)=     ' + bold + 'CLIC' + reset + dim + '\r\n' +
        '       / \\       Cooler Lightweight\r\n' +
        '      (   )      IDE for Command line\r\n' +
        '     /|___|\\\r\n' +
        reset + '\r\n'
      );
      if (ws && ws.readyState === WebSocket.OPEN)
        ws.send(JSON.stringify({ type: 'new_session', session: id }));
    });
  });
  return tab;
}

function openMarkdown(filename, content) {
  tabCounter++;
  const id = 'md-' + tabCounter;

  const el = document.createElement('div');
  el.className = 'md-viewer';
  el.id = id;
  el.innerHTML = marked.parse(content);
  document.getElementById('terminals').appendChild(el);

  const tabEl = document.createElement('div');
  tabEl.className = 'tab';
  tabEl.innerHTML = `<span class="tab-label"> ${filename}</span><span class="close-tab">×</span>`;
  tabEl.querySelector('.tab-label').addEventListener('click', () => switchTab(id));
  tabEl.querySelector('.close-tab').addEventListener('click', (e) => { e.stopPropagation(); closeTab(id); });
  document.getElementById('tabs-container').appendChild(tabEl);

  const tab = { id, term: null, fitAddon: null, el, tabEl, isMd: true };
  tabs.push(tab);
  switchTab(id);
}

function switchTab(id) {
  activeTabId = id;
  tabs.forEach(t => {
    const isActive = t.id === id;
    t.el.classList.toggle('active', isActive);
    t.tabEl.classList.toggle('active', isActive);
  });
  const tab = tabs.find(t => t.id === id);
  if (tab && tab.fitAddon) setTimeout(() => { tab.fitAddon.fit(); tab.term.focus(); }, 50);
}

function closeTab(id) {
  if (tabs.length <= 1) return;
  const idx = tabs.findIndex(t => t.id === id);
  if (idx === -1) return;
  const tab = tabs[idx];
  if (tab.term) tab.term.dispose();
  tab.el.remove(); tab.tabEl.remove();
  tabs.splice(idx, 1);
  if (!tab.isMd && ws && ws.readyState === WebSocket.OPEN)
    ws.send(JSON.stringify({ type: 'close_session', session: id }));
  if (activeTabId === id) switchTab(tabs[Math.min(idx, tabs.length-1)].id);
}

// ── WebSocket ───────────────────────────────────
function connect() {
  ws = new WebSocket('ws://127.0.0.1:17761');
  ws.onopen = () => {
    // Request config from server
    ws.send(JSON.stringify({ type: 'get_config' }));
    ws.send(JSON.stringify({ type: 'refresh_files' }));
  };
  ws.onmessage = (event) => {
    const msg = JSON.parse(event.data);
    if (msg.type === 'output') {
      const tab = tabs.find(t => t.id === msg.session);
      if (tab) tab.term.write(msg.data);
    } else if (msg.type === 'files') {
      updateSidebar(msg.path, msg.entries);
    } else if (msg.type === 'md_content') {
      openMarkdown(msg.filename, msg.content);
    } else if (msg.type === 'config') {
      CONFIG = msg.data;
      applyConfig();
      // Now create the first tab (with correct font)
      if (tabs.length === 0) createTab();
    }
  };
  ws.onclose = () => setTimeout(() => connect(), 1000);
}

function applyConfig() {
  // Font for UI
  const fontFamily = getTermFont();
  document.documentElement.style.setProperty('--ui-font', fontFamily);

  // Background image
  const bgImg = CONFIG.background_image;
  const bgEl = document.getElementById('bg-image');
  if (bgImg) {
    bgEl.style.backgroundImage = `url('/bg-image')`;
    bgEl.classList.add('active');
    document.documentElement.style.setProperty('--bg-opacity', CONFIG.background_opacity || 0.05);
  }

  // Shortcuts
  const shortcuts = CONFIG.shortcuts || [];
  const list = document.getElementById('shortcuts-list');
  list.innerHTML = '';
  shortcuts.forEach(s => {
    const el = document.createElement('div');
    el.className = 'shortcut-entry';
    el.innerHTML = `<span>${s.label}</span><span class="shortcut-key">${s.key || ''}</span>`;
    el.addEventListener('click', () => {
      if (ws && ws.readyState === WebSocket.OPEN && activeTabId) {
        ws.send(JSON.stringify({ type: 'run_shortcut', session: activeTabId, command: s.command }));
      }
    });
    list.appendChild(el);
  });
}

// ── Sidebar (click = navigate, ctrl+click = cd) ──
const VENV_NAMES = new Set(['venv', '.venv', 'env', '.env']);

function isVenvDir(name) {
  return VENV_NAMES.has(name.toLowerCase());
}

function updateSidebar(pathStr, files) {
  document.getElementById('sidebar-path').textContent = pathStr;
  const list = document.getElementById('file-list');
  list.innerHTML = '';
  files.forEach(f => {
    const el = document.createElement('div');
    let cls = 'file-entry';
    if (f.is_dir) cls += ' dir';
    if (f.name === '..') cls += ' up';
    const isHidden = f.name.startsWith('.') && f.name !== '..';
    if (isHidden) cls += ' hidden-entry';
    el.className = cls;
    el.textContent = f.icon + ' ' + f.name;
    el.addEventListener('click', (e) => {
      if (!ws || ws.readyState !== WebSocket.OPEN) return;
      if (f.is_dir) {
        if (e.ctrlKey || e.metaKey) {
          ws.send(JSON.stringify({
            type: 'file_click', session: activeTabId,
            path: f.path, is_dir: true, name: f.name, do_cd: true,
          }));
        } else {
          ws.send(JSON.stringify({
            type: 'file_click', session: activeTabId,
            path: f.path, is_dir: true, name: f.name, do_cd: false,
          }));
        }
      } else if (e.ctrlKey || e.metaKey) {
        // Ctrl+click: paste quoted path into terminal
        if (activeTabId)
          ws.send(JSON.stringify({ type: 'input', session: activeTabId, data: `"${f.path}"` }));
      } else {
        ws.send(JSON.stringify({
          type: 'file_click', session: activeTabId,
          path: f.path, is_dir: false, name: f.name, do_cd: false, run: false,
        }));
      }
    });
    // Right-click on venv directories
    if (f.is_dir && isVenvDir(f.name)) {
      el.addEventListener('contextmenu', (e) => {
        e.preventDefault();
        ctxTarget = f;
        ctxMenu.style.left = e.clientX + 'px';
        ctxMenu.style.top = e.clientY + 'px';
        ctxMenu.classList.add('visible');
      });
    }
    list.appendChild(el);
  });
}

// ── Keyboard shortcuts ──────────────────────────
document.addEventListener('keydown', (e) => {
  if (e.altKey && (e.key === 'e' || e.key === 'b')) {
    e.preventDefault();
    toggleSidebar();
  }
  if (e.ctrlKey && e.key === 't') { e.preventDefault(); createTab(); }
  if (e.ctrlKey && e.key === 'w') { e.preventDefault(); if (activeTabId) closeTab(activeTabId); }
  if (e.ctrlKey && e.key === 'Tab') {
    e.preventDefault();
    const idx = tabs.findIndex(t => t.id === activeTabId);
    const next = e.shiftKey ? (idx-1+tabs.length)%tabs.length : (idx+1)%tabs.length;
    switchTab(tabs[next].id);
  }
  if (e.ctrlKey && e.key === ',') {
    e.preventDefault();
    if (ws && ws.readyState === WebSocket.OPEN) ws.send(JSON.stringify({ type: 'open_settings' }));
  }
  if (e.key === 'Escape') {
    e.preventDefault();
    const tab = tabs.find(t => t.id === activeTabId);
    if (tab) {
      tab.term.focus();
      if (ws && ws.readyState === WebSocket.OPEN)
        ws.send(JSON.stringify({ type: 'input', session: activeTabId, data: '\x1b' }));
    }
  }

  // Custom shortcuts from config
  const shortcuts = CONFIG.shortcuts || [];
  shortcuts.forEach(s => {
    if (!s.key) return;
    const parts = s.key.toLowerCase().split('+');
    const needCtrl = parts.includes('ctrl');
    const needShift = parts.includes('shift');
    const needAlt = parts.includes('alt');
    const key = parts.filter(p => !['ctrl','shift','alt'].includes(p))[0];
    if (e.ctrlKey === needCtrl && e.shiftKey === needShift && e.altKey === needAlt && e.key.toLowerCase() === key) {
      e.preventDefault();
      if (ws && ws.readyState === WebSocket.OPEN && activeTabId)
        ws.send(JSON.stringify({ type: 'run_shortcut', session: activeTabId, command: s.command }));
    }
  });
});

// Scroll: handle wheel on terminals area directly so xterm always gets it
document.getElementById('terminals').addEventListener('wheel', (e) => {
  if (e.ctrlKey) { e.preventDefault(); return; }
  const tab = tabs.find(t => t.id === activeTabId);
  if (tab && tab.term) {
    const lines = Math.round(e.deltaY / 20) || (e.deltaY > 0 ? 3 : -3);
    tab.term.scrollLines(lines);
  }
  e.preventDefault();
}, { passive: false });

window.addEventListener('resize', () => {
  const t = tabs.find(t => t.id === activeTabId); if (t) t.fitAddon.fit();
});

document.getElementById('new-tab-btn').addEventListener('click', () => createTab());
document.getElementById('sidebar-toggle').addEventListener('click', () => toggleSidebar());

function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('hidden');
  setTimeout(() => {
    const t = tabs.find(t => t.id === activeTabId); if (t && t.fitAddon) t.fitAddon.fit();
  }, 200);
}

// ── Open folder button ──────────────────────────
document.getElementById('open-folder-btn').addEventListener('click', () => {
  if (ws && ws.readyState === WebSocket.OPEN)
    ws.send(JSON.stringify({ type: 'open_folder_dialog' }));
});

// ── Context menu (right-click on file entries) ──
let ctxMenu = document.getElementById('ctx-menu');
let ctxTarget = null;

function hideCtxMenu() {
  ctxMenu.classList.remove('visible');
  ctxTarget = null;
}

document.addEventListener('click', hideCtxMenu);
document.addEventListener('keydown', (e) => { if (e.key === 'Escape') hideCtxMenu(); });

document.getElementById('ctx-activate-venv').addEventListener('click', () => {
  if (!ctxTarget || !ws || ws.readyState !== WebSocket.OPEN) return;
  const activateScript = ctxTarget.path.replace(/\\/g, '/') + '/Scripts/activate.bat';
  ws.send(JSON.stringify({
    type: 'input', session: activeTabId,
    data: `call "${ctxTarget.path}\\Scripts\\activate.bat"\r`,
  }));
  hideCtxMenu();
});

// ── Init ────────────────────────────────────────
initSettings();
loadTheme().then(() => connect());
</script>
